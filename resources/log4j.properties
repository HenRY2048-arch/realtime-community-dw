# Set everything to be logged to the console
log4j.rootCategory=WARN, console
log4j.appender.console=org.apache.log4j.ConsoleAppender
log4j.appender.console.target=System.err
log4j.appender.console.layout=org.apache.log4j.PatternLayout
log4j.appender.console.layout.ConversionPattern=%d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n

# Settings to quiet third party logs that are too verbose
log4j.logger.org.eclipse.jetty=WARN
log4j.logger.org.eclipse.jetty.util.component.AbstractLifeCycle=ERROR
log4j.logger.org.apache.spark.repl.Main=WARN
log4j.logger.org.apache.spark.sql.catalyst.expressions.codegen=WARN
log4j.logger.org.apache.spark.sql.execution.datasources.parquet=WARN
log4j.logger.org.apache.spark.sql.execution.streaming=WARN
log4j.logger.org.apache.spark.sql.internal.SQLConf=WARN
log4j.logger.org.apache.spark.sql.streaming=WARN
log4j.logger.org.apache.spark.sql.hive.thriftserver=WARN
log4j.logger.org.apache.hadoop=WARN
log4j.logger.org.sparkproject.jetty=WARN
log4j.logger.org.sparkproject.jetty.util.component.AbstractLifeCycle=ERROR
log4j.logger.akka=WARN
log4j.logger.org.apache.kafka=ERROR